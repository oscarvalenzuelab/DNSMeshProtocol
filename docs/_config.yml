title: DNS Mesh Protocol
description: >-
  Federated end-to-end encrypted messaging that tunnels through DNS TXT records.
  Sender-authenticated, signed, with forward secrecy for prekey-consumed messages.

# Pretty URLs and relative links that work both under GitHub Pages (served at
# /DNSMeshProtocol/) and when previewing locally with `bundle exec jekyll serve`.
baseurl: /DNSMeshProtocol
url: "https://oscarvalenzuelab.github.io"

# Use Just the Docs as a remote theme so GitHub Pages builds it for us without
# having to vendor the theme files. Pinned via @main; if you want a specific
# tagged version, replace with just-the-docs/just-the-docs@v0.8.2 or similar.
remote_theme: just-the-docs/just-the-docs

color_scheme: dark

# Just-the-Docs Mermaid integration. Adds a per-page <pre><code class="language-mermaid"></code></pre>
# renderer so ```mermaid fences in markdown produce diagrams.
mermaid:
  version: "10.6.0"

# Sidebar / search configuration.
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  rel_url: true
  button: false

# Top-right aux link — always visible in the header.
aux_links:
  "GitHub":
    - "https://github.com/oscarvalenzuelab/DNSMeshProtocol"
aux_links_new_tab: true

# Footer content appears under the page table-of-contents on every page.
footer_content: >-
  Content licensed under
  <a href="https://github.com/oscarvalenzuelab/DNSMeshProtocol/blob/main/LICENSE">
  AGPL-3.0</a>. Non-certified, pre-audit — see
  <a href="https://github.com/oscarvalenzuelab/DNSMeshProtocol/blob/main/SECURITY.md">SECURITY.md</a>.

# Show "Edit this page on GitHub" links.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/oscarvalenzuelab/DNSMeshProtocol"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Enable callouts (the `{: .note }` syntax Just the Docs ships with).
callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

# Skip these files so Jekyll doesn't try to render tooling-only things.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - README.md

# We keep Jekyll default plugins only — enough for the Pages build pipeline.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
