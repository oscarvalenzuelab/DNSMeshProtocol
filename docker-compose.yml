services:
  dnsmesh-node:
    build: .
    image: dnsmesh-node:latest
    container_name: dnsmesh-node
    restart: unless-stopped

    # Production operators who want real port 53 can remap via:
    #   ports:
    #     - "53:5353/udp"
    # and ensure nothing else (systemd-resolved, dnsmasq) holds port 53 on the
    # host. For local dev we expose 5353 directly.
    ports:
      - "5353:5353/udp"
      - "8053:8053/tcp"

    environment:
      DMP_DB_PATH: /var/lib/dmp/dmp.db
      DMP_DNS_HOST: 0.0.0.0
      DMP_DNS_PORT: "5353"
      DMP_DNS_TTL: "60"
      # Enable per-IP DNS rate limits for public-facing deployments:
      # DMP_DNS_RATE: "50"    # queries/sec per source IP
      # DMP_DNS_BURST: "200"  # burst budget
      DMP_HTTP_HOST: 0.0.0.0
      DMP_HTTP_PORT: "8053"
      # Set DMP_HTTP_TOKEN to require bearer auth on the HTTP API:
      # DMP_HTTP_TOKEN: ${DMP_HTTP_TOKEN:-}
      # HTTP rate limits, same idea as DNS:
      # DMP_HTTP_RATE: "5"
      # DMP_HTTP_BURST: "20"
      DMP_CLEANUP_INTERVAL: "60"
      DMP_LOG_LEVEL: INFO
      # Set DMP_LOG_FORMAT: json for structured logs ingestion:
      # DMP_LOG_FORMAT: json

    volumes:
      - dnsmesh-data:/var/lib/dmp

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8053/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  dnsmesh-data:
