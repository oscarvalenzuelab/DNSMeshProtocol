name: publish-pypi

# Builds sdist + wheel and publishes the `dmp` package to PyPI.
#
# Triggers:
#   - push of an sdk-v* tag: canonical release path
#   - manual workflow_dispatch: only useful for re-runs; the version
#     the uploader asserts still has to match dmp/__init__.py
#
# One-time setup on PyPI (required — no API token is used, the whole
# point of OIDC trusted publishing is avoiding a long-lived secret):
#
#   pypi.org → Your projects → dmp → Publishing → Add a pending publisher
#     Owner:          oscarvalenzuelab
#     Repository:     DNSMeshProtocol
#     Workflow name:  publish-pypi.yml
#     Environment:    pypi
#
# The `environment: pypi` line below has to stay in sync with whatever
# environment name you configure on PyPI.

on:
  push:
    tags: ["sdk-v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # OIDC token issued to gh-action-pypi-publish

jobs:
  build-and-publish:
    name: build + publish sdist/wheel
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag version matches dmp/__init__.py
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF##*/}"
          TAG_VERSION="${TAG#sdk-v}"
          SRC_VERSION=$(sed -nE 's/^__version__ = "([^"]+)"$/\1/p' dmp/__init__.py | head -n1)
          SETUP_VERSION=$(sed -nE 's/^ *version="([^"]+)",$/\1/p' setup.py | head -n1)
          if [[ "$TAG_VERSION" != "$SRC_VERSION" || "$TAG_VERSION" != "$SETUP_VERSION" ]]; then
            echo "version mismatch:"
            echo "  tag           = $TAG_VERSION"
            echo "  __init__.py   = $SRC_VERSION"
            echo "  setup.py      = $SETUP_VERSION"
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
