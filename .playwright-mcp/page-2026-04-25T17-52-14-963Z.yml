        - paragraph: "DMP is an open, free messaging protocol designed to do one job well:"
        - blockquote: Deliver a private message from one person to another, even when the network actively tries to stop you.
        - paragraph:
          - text: It is
          - emphasis: not
          - text: a company, a product, or an app. It is a specification anyone can implement, plus a reference open-source implementation released under a permissive license.
        - generic:
