# docker-compose.cluster.yml — 3-node federated DMP cluster sample.
#
# Operator starting point for a real cluster. Each node-{a,b,c} container:
#
#   * reads its per-node env file at docker/cluster/node-{a,b,c}.env
#   * shares the same signed cluster manifest (docker/cluster/cluster-manifest.wire)
#     so a rolled operator key stays consistent across all three
#   * points at the OTHER two nodes as anti-entropy peers via the
#     internal docker-compose network (DNS names: dnsmesh-node-a,
#     dnsmesh-node-b, dnsmesh-node-c)
#   * exposes its DNS + HTTP to the LOCAL HOST ONLY on 127.0.0.1 —
#     public-facing deployments should pair this compose with a real
#     reverse proxy (see docker-compose.prod.yml) and never publish the
#     sync endpoints externally
#
# Generate the shared manifest once before `up`:
#
#   python docker/cluster/generate-cluster-manifest.py \
#       --cluster-name mesh.local \
#       --manifest-out docker/cluster/cluster-manifest.wire \
#       --operator-key-out docker/cluster/operator-ed25519.hex
#
# Then:
#
#   docker compose -f docker-compose.cluster.yml up -d
#
# Tear down with `docker compose -f docker-compose.cluster.yml down -v`.
#
# A single DMP_SYNC_PEER_TOKEN is SHARED across all three nodes. In a
# real deployment rotate this token out of the checked-in sample and
# into a secret store. The token is the only thing guarding the sync
# endpoints; leaking it to an attacker on the internal network lets
# them read every record on the node.

version: "3.8"

services:
  node-a:
    build: .
    image: dnsmesh-node:latest
    container_name: dnsmesh-node-a
    env_file: docker/cluster/node-a.env
    # Survive crashes + host reboots. `unless-stopped` is preferable
    # to `always` here so an operator running `docker compose down`
    # really stops the cluster rather than fighting the daemon.
    restart: unless-stopped
    volumes:
      - dnsmesh-data-a:/var/lib/dmp
      - ./docker/cluster/cluster-manifest.wire:/etc/dmp/cluster-manifest.wire:ro
    ports:
      # 127.0.0.1 bind keeps these off the public interface. Operators
      # who want remote access should front the HTTP port with TLS.
      - "127.0.0.1:5301:5353/udp"
      - "127.0.0.1:8101:8053/tcp"
    networks: [dnsmesh-cluster]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8053/health"]
      interval: 10s
      timeout: 3s
      start_period: 3s
      retries: 3

  node-b:
    build: .
    image: dnsmesh-node:latest
    container_name: dnsmesh-node-b
    env_file: docker/cluster/node-b.env
    restart: unless-stopped
    volumes:
      - dnsmesh-data-b:/var/lib/dmp
      - ./docker/cluster/cluster-manifest.wire:/etc/dmp/cluster-manifest.wire:ro
    ports:
      - "127.0.0.1:5302:5353/udp"
      - "127.0.0.1:8102:8053/tcp"
    networks: [dnsmesh-cluster]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8053/health"]
      interval: 10s
      timeout: 3s
      start_period: 3s
      retries: 3

  node-c:
    build: .
    image: dnsmesh-node:latest
    container_name: dnsmesh-node-c
    env_file: docker/cluster/node-c.env
    restart: unless-stopped
    volumes:
      - dnsmesh-data-c:/var/lib/dmp
      - ./docker/cluster/cluster-manifest.wire:/etc/dmp/cluster-manifest.wire:ro
    ports:
      - "127.0.0.1:5303:5353/udp"
      - "127.0.0.1:8103:8053/tcp"
    networks: [dnsmesh-cluster]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8053/health"]
      interval: 10s
      timeout: 3s
      start_period: 3s
      retries: 3

networks:
  dnsmesh-cluster:
    driver: bridge

volumes:
  dnsmesh-data-a:
  dnsmesh-data-b:
  dnsmesh-data-c:
