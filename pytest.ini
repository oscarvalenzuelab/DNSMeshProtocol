[pytest]
# Restrict collection to the tests/ tree. Without this, pytest walks
# the whole repo and tries to import scripts/m{9,10}-test/e2e_test.py
# as test modules — they're driver scripts for the docker-compose
# stacks under scripts/m{9,10}-test/, not pytest tests, and the
# duplicate `e2e_test` basename across the two harness dirs trips
# pytest's import-mode collision check.
testpaths = tests
