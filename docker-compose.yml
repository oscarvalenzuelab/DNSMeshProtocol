services:
  dmp-node:
    build: .
    image: dmp-node:latest
    container_name: dmp-node
    restart: unless-stopped

    # Production operators who want real port 53 can remap via:
    #   ports:
    #     - "53:5353/udp"
    # and ensure nothing else (systemd-resolved, dnsmasq) holds port 53 on the
    # host. For local dev we expose 5353 directly.
    ports:
      - "5353:5353/udp"
      - "8053:8053/tcp"

    environment:
      DMP_DB_PATH: /var/lib/dmp/dmp.db
      DMP_DNS_HOST: 0.0.0.0
      DMP_DNS_PORT: "5353"
      DMP_DNS_TTL: "60"
      DMP_HTTP_HOST: 0.0.0.0
      DMP_HTTP_PORT: "8053"
      # Set DMP_HTTP_TOKEN to require bearer auth on the HTTP API:
      # DMP_HTTP_TOKEN: ${DMP_HTTP_TOKEN:-}
      DMP_CLEANUP_INTERVAL: "60"
      DMP_LOG_LEVEL: INFO

    volumes:
      - dmp-data:/var/lib/dmp

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8053/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  dmp-data:
