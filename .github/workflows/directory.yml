name: directory-aggregator

# Refreshes the canonical directory feed at
# https://ovalenzuela.com/DNSMeshProtocol/directory/ — feed.json + index.html
# rendered from `directory/seeds.txt` via examples/directory_aggregator.py.
#
# How it ends up published:
#   1. This workflow runs on cron + on demand.
#   2. It writes docs/directory/{feed.json,index.html}.
#   3. If the rendered output changes (modulo the timestamp line in
#      index.html and the `generated_at` field in feed.json), it commits
#      the diff to main as a [skip ci] commit.
#   4. The existing pages.yml workflow watches docs/** on push and
#      rebuilds the Jekyll site, which picks up the new files.
#
# Federated by design: anyone can run their own aggregator off any
# subset of seeds. This workflow only renders the project-canonical
# version. See directory/seeds.txt for how operators add their node.

on:
  schedule:
    # Every 30 minutes. Matches the freshness target on the heartbeat
    # design doc; nodes default to 1 hour heartbeat intervals so 30 min
    # is the smallest meaningful refresh cadence.
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "directory/seeds.txt"
      - "examples/directory_aggregator.py"
      - "dmp/server/heartbeat_html.py"
      - ".github/workflows/directory.yml"

permissions:
  contents: write  # to push the regenerated docs/directory/ files

concurrency:
  group: directory-aggregator
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime deps
        # `pip install -e .` brings in the runtime dependency set from
        # setup.py (requests, cryptography, argon2-cffi, dnspython,
        # reedsolo, zfec, ...). The aggregator imports
        # `dmp.core.heartbeat`, which transitively pulls argon2 via
        # `dmp.core.crypto`, so an --no-deps install fails fast at
        # import time. Dev extras (pytest, mypy, ...) intentionally
        # not installed: this job doesn't need them.
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run aggregator
        run: |
          python examples/directory_aggregator.py \
            --seeds-file directory/seeds.txt \
            --out-dir docs/directory

      - name: Commit if changed
        # Comparing rendered output ignoring the cosmetic timestamp:
        # the page header carries `Generated <UTC time>` which would
        # otherwise produce a no-op commit every 30 minutes. Filtering
        # that line out before diffing means we only commit when the
        # actual node list changes.
        run: |
          set -euo pipefail
          git config user.name "dnsmesh-directory-bot"
          git config user.email "noreply@anthropic.com"
          git add docs/directory/

          # Diff the staged changes ignoring lines that contain
          # 'Generated' (the cosmetic timestamp) — both feed.json's
          # `generated_at` and index.html's <small>Generated …</small>
          # share that token.
          if git diff --staged --no-color | grep -E '^[+-]' \
              | grep -v '^[+-]{3}' \
              | grep -v 'Generated\|generated_at' \
              | grep -q .; then
            # Deliberately NOT marking [skip ci]: GitHub Actions honors
            # that token, and the next pages.yml run is exactly what we
            # want — it's the build that publishes the regenerated feed.
            git commit -m "chore(directory): refresh feed"
            git push origin main
          else
            echo "No semantic changes; skipping commit."
            git restore --staged docs/directory/
          fi
